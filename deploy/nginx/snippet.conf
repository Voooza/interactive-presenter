# ==========================================================================
# nginx location blocks for Interactive Presenter
#
# Include this file inside your existing server { } block, e.g.:
#
#   server {
#       listen 443 ssl;
#       server_name slides.example.com;
#       # ... your TLS config ...
#
#       include /path/to/snippet.conf;
#   }
#
# The app container must be reachable at 127.0.0.1:8000
# (default from docker-compose.yml).
# ==========================================================================

# --- WebSocket: /ws/* (emoji reactions, polls, Q&A — all real-time) -------
# Without the Upgrade headers, WebSocket connections fail silently and
# every interactive feature breaks.
location /ws/ {
    proxy_pass http://127.0.0.1:8000;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket connections are long-lived
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}

# --- API + health check + frontend (everything else) ---------------------
location / {
    proxy_pass http://127.0.0.1:8000;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
