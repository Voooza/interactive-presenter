# ===========================================================================
# Docker Compose — Interactive Presenter (production)
#
# Single service: FastAPI/uvicorn backend serving API + WebSocket + static
# frontend assets. Listens on 127.0.0.1:8000 by default.
#
# Your existing nginx reverse-proxies to this. See deploy/nginx/snippet.conf
# for the required location blocks (especially WebSocket upgrade headers).
#
# Quick start:
#   docker compose up -d --build
#
# ===========================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interactive-presenter
    restart: unless-stopped
    environment:
      - PRESENTATIONS_DIR=/app/presentations
      - STATIC_DIR=/app/frontend/dist
    volumes:
      # Mount presentations from the host so they can be updated without
      # rebuilding the image.
      - ./presentations:/app/presentations:ro
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
